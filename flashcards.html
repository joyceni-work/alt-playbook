<!DOCTYPE html>
<html lang="en" data-theme="dreamlight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALT Playbook — Practice Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/quiz.css?v=4" />
  <script>(function(){var t=localStorage.getItem('alt-theme')||'dreamlight';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="quiz-body-page">

  <!-- Grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Gradient background -->
  <div class="orb-field quiz-orb-field" aria-hidden="true">
    <div class="orb-warm"></div>
    <div class="orb-mauve"></div>
  </div>

  <!-- Corner brackets (pixel) -->
  <div class="corners" aria-hidden="true">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
  </div>

  <div class="fc-page">

    <!-- Top bar -->
    <div class="results-topbar">
      <a href="index2.html" class="quiz-home" style="color:rgba(20,20,20,0.55)">← Home</a>
      <span class="tag" style="color:rgba(20,20,20,0.45)">ALT Playbook</span>
      <a href="quiz.html" class="quiz-home" style="color:rgba(20,20,20,0.55)">Take Quiz →</a>
    </div>

    <!-- Header -->
    <div class="fc-header">
      <p class="fc-eyebrow" style="color:rgba(20,20,20,0.5)">Flashcard Practice</p>
      <h1 class="fc-title" style="color:rgba(20,20,20,0.85)">Review the Concepts</h1>
    </div>

    <!-- Constellation progress (dreamlight) -->
    <div class="constellation-wrap" id="fc-constellation-wrap">
      <svg id="fc-constellation-svg" class="constellation-svg" width="100%" height="56" viewBox="0 0 600 48" preserveAspectRatio="none"></svg>
    </div>

    <!-- Retro progress bar (pixel) -->
    <div class="retro-progress-wrap" id="fc-retro-wrap">
      <div class="retro-progress-track">
        <div class="retro-progress-fill" id="fc-retro-fill"></div>
      </div>
      <span class="retro-progress-label" id="fc-count">01 / 27</span>
    </div>

    <!-- Stacked card scene -->
    <div class="fc-stack">
      <div class="fc-ghost fc-ghost-2" aria-hidden="true"></div>
      <div class="fc-ghost fc-ghost-1" aria-hidden="true"></div>

      <div class="fc-scene"
           id="fc-scene"
           tabindex="0"
           role="button"
           aria-pressed="false"
           aria-label="Flashcard: question shown. Press Space or Enter to flip.">
        <div class="fc-card" id="fc-card">

          <div class="fc-front" role="group" aria-label="Front of card">
            <p class="fc-label" aria-hidden="true">Term</p>
            <p class="fc-text" id="fc-front-text" aria-live="polite"></p>
            <p class="fc-hint" aria-hidden="true">Tap to flip · drag to navigate</p>
          </div>

          <div class="fc-back" role="group" aria-label="Back of card">
            <p class="fc-label" aria-hidden="true">From the Playbook</p>
            <p class="fc-text" id="fc-back-text" aria-live="polite"></p>
          </div>

        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="fc-controls" role="group" aria-label="Card navigation">
      <button class="fc-nav-btn" id="fc-prev" aria-label="Previous card">← Prev</button>
      <button class="fc-flip-btn" id="fc-flip" aria-pressed="false">Flip Card</button>
      <button class="fc-nav-btn" id="fc-next" aria-label="Next card">Next →</button>
    </div>

    <!-- CTA -->
    <div class="fc-bottom-row">
      <a href="quiz.html" class="fc-ready-cta">Ready to Test →</a>
    </div>

  </div>

  <script src="js/questions.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/cursor.js"></script>

</body>
</html>
