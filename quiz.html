<!DOCTYPE html>
<html lang="en" data-theme="dreamlight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALT Playbook Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/quiz.css" />
  <script>(function(){var t=localStorage.getItem('alt-theme')||'dreamlight';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="quiz-body-page">

  <!-- Grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Gradient background -->
  <div class="orb-field quiz-orb-field" aria-hidden="true">
    <div class="orb-warm"></div>
    <div class="orb-mauve"></div>
  </div>

  <div class="quiz-page">

    <!-- Top bar: home + section tag + question counter -->
    <div class="quiz-topbar">
      <a href="index2.html" class="quiz-home">← Home</a>
      <span class="tag" id="section-label">Loading...</span>
      <span class="quiz-counter" id="question-counter">01 / 27</span>
    </div>

    <!-- Constellation progress (dreamlight) -->
    <div class="constellation-wrap">
      <svg id="constellation-svg" class="constellation-svg" width="100%" height="56" viewBox="0 0 600 48" preserveAspectRatio="none"></svg>
    </div>

    <!-- Retro progress bar (pixel theme) -->
    <div class="retro-progress-wrap">
      <div class="retro-progress-track">
        <div class="retro-progress-fill" id="retro-progress-fill"></div>
      </div>
      <span class="retro-progress-label" id="retro-progress-label">01 / 27</span>
    </div>

    <!-- Main content -->
    <div class="quiz-main">
      <p class="question-text" id="question-text"></p>
      <div class="options" id="options"></div>

      <!-- Explanation — shown after answering -->
      <div class="explanation" id="explanation">
        <div class="explanation-sparkles" aria-hidden="true">
          <span>✦</span>
          <span>✦</span>
          <span>✦</span>
        </div>
        <span class="explanation-label">From the Playbook</span>
        <p class="explanation-text" id="explanation-text"></p>
      </div>
    </div>

    <!-- Next button -->
    <div class="quiz-footer">
      <button class="btn-next" id="next-btn">Next &nbsp;→</button>
    </div>

  </div>

  <script src="js/questions.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/cursor.js"></script>
</body>
</html>
